name: Java CI/CD with Docker

on:
  push:
    branches: main
  workflow_dispatch:  # Allows manual trigger

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: codingcare/service
  CONTAINER_NAME: DUMMYCONTAINER

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Analyze with SonarCloud
        run: mvn clean verify sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          # Build a docker container and push it to ECR
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # STEP 1: Get GitHub Runner's Public IP
      - name: Get GitHub runner IP
        id: ip
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          echo "✅ GitHub Runner IP: $RUNNER_IP"

      # STEP 2: Add Runner IP to EC2 Security Group
      - name: Allow GitHub runner IP in Security Group
        run: |
          echo "Adding IP ${{ steps.ip.outputs.runner_ip }} to security group ${{ secrets.AWS_SECURITY_GROUP_ID }}"
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.runner_ip }}/32 \
            --region ${{ env.AWS_REGION }} \
            || echo "⚠️ Rule may already exist or couldn't be added"
          
          # Verify rule was added
          aws ec2 describe-security-group-rules \
            --filters Name="group-id",Values="${{ secrets.AWS_SECURITY_GROUP_ID }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'SecurityGroupRules[?IpProtocol==`tcp` && FromPort==`22` && CidrIpv4==`${{ steps.ip.outputs.runner_ip }}/32`]' \
            --output table

      # STEP 3: Wait for security group rules to propagate
      - name: Wait for security group propagation
        run: sleep 15

      # STEP 4: Test SSH connectivity before deployment
      - name: Test SSH connection
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "✅ SSH connection successful!"
            echo "Hostname: $(hostname)"
            echo "Uptime: $(uptime)"
            echo "Docker version: $(docker --version)"

      # STEP 5: Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e  # Exit on error
            
            echo "🔐 Logging into ECR..."
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            echo "📥 Pulling latest image..."
            docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            
            echo "🛑 Stopping old container..."
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            
            echo "🚀 Starting new container..."
            docker run -d \
              -p 80:8080 \
              --name ${{ env.CONTAINER_NAME }} \
              --restart always \
              ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            
            echo "✅ Container started successfully!"
            echo "📋 Container status:"
            docker ps --filter "name=${{ env.CONTAINER_NAME }}"
            
            # Health check
            sleep 5
            if docker ps --filter "name=${{ env.CONTAINER_NAME }}" --format "table {{.Status}}" | grep -q "Up"; then
              echo "✅ Container is running!"
            else
              echo "❌ Container failed to start"
              docker logs ${{ env.CONTAINER_NAME }} --tail 50
              exit 1
            fi

      # STEP 6: Cleanup - Remove Runner IP from Security Group
      - name: Remove GitHub runner IP from Security Group
        if: always()  # Always run this step, even if deployment fails
        run: |
          echo "Removing IP ${{ steps.ip.outputs.runner_ip }} from security group"
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.runner_ip }}/32 \
            --region ${{ env.AWS_REGION }} \
            || echo "⚠️ Rule may not exist or couldn't be removed"
          echo "✅ Cleanup completed"

      # STEP 7: Deployment status notification
      - name: Deployment Status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "🎉 Deployment successful! Application is running on http://${{ secrets.EC2_HOST }}"
          else
            echo "❌ Deployment failed! Check logs above."
            exit 1
          fi